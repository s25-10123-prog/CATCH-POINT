    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [view, setView] = useState('login');
      const [activeTab, setActiveTab] = useState('record');
      
      const [email, setEmail] = useState('');

      const [message, setMessage] = useState({ type: '', text: '' });

      const [grade, setGrade] = useState('1'); 
      const [saveStatus, setSaveStatus] = useState('');
      const [isAddingSubject, setIsAddingSubject] = useState(false);
      const [newSubjectName, setNewSubjectName] = useState('');
      const [byteCalcMode, setByteCalcMode] = useState('char');

      const [deptSearch, setDeptSearch] = useState('');
      const [selectedDept, setSelectedDept] = useState('컴퓨터공학과');
      const [isDeptDropdownOpen, setIsDeptDropdownOpen] = useState(false);

      const [aiFeedbackText, setAiFeedbackText] = useState('');
      const [isGeneratingFeedback, setIsGeneratingFeedback] = useState(false);

      const [isDarkMode, setIsDarkMode] = useState(() => {

      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [modal, setModal] = useState({ show: false, title: '', message: '', onConfirm: null });

      const [allGradesData, setAllGradesData] = useState({

      });

      const canvasRef = useRef(null);

      // Auth 상태 변화 감시자 세팅
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);

            setMessage({ type: '', text: '' });

            setView('login');
          }

      }, []);

      // Firestore 실시간 데이터 로드
      useEffect(() => {
        if (!user) return;

        const unsubscribes = ['1', '2', '3'].map((g) => {
          const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('records').doc(`grade_${g}`);
          
          return docRef.onSnapshot((docSnap) => {
            if (docSnap.exists) {
              const data = docSnap.data();
              setAllGradesData(prev => ({
                ...prev,
                [g]: {
                  fixed: data.fixed || {},
                  subjects: data.subjects || [],
                  grades: data.grades || {},
                  targetDept: data.targetDept || '컴퓨터공학과'
                }
              }));
              if (g === grade) {
                setSelectedDept(data.targetDept || '컴퓨터공학과');
              }
            } else {
              const initialFixed = {};
              Object.keys(FIXED_STRUCTURE).forEach(key => initialFixed[key] = "");

              const defaultSubjectsForGrade = DEFAULT_GRADE_SUBJECTS[g].map((sub, index) => ({
                id: `default_${g}_${index}_${Date.now()}`,
                name: sub.name,
                content: sub.content,

              }));

              setAllGradesData(prev => ({
                ...prev,

                  fixed: initialFixed,

                  targetDept: '컴퓨터공학과'

                setSelectedDept('컴퓨터공학과');

        return () => unsubscribes.forEach(unsub => unsub());
      }, [user]);

      useEffect(() => {
        if (allGradesData[grade]) {
          setSelectedDept(allGradesData[grade].targetDept || '컴퓨터공학과');
          setAiFeedbackText('');
        }
      }, [grade]);

      const processEmailInput = (emailStr) => {
        const trimmed = emailStr.trim();
        if (trimmed.toLowerCase() === 'admin') {
          return 'admin@admin.com';
        }
        return trimmed;
      };

      const isValidEmail = (emailStr) => {
        const processed = processEmailInput(emailStr);
        return /\S+@\S+\.\S+/.test(processed);
      };

      const getByteLength = (str) => {
        if (!str) return 0;
        let byteLength = 0;
        for (let i = 0; i < str.length; i++) {
          const code = str.charCodeAt(i);
          if (code === 10) { 
            byteLength += 2; 
          } else if (code > 127) {
            byteLength += 3; 
          } else {
            byteLength += 1; 
          }
        }
        return byteLength;
      };

      const handleAuthAction = async (e, actionType) => {
        e.preventDefault();
        setMessage({ type: '', text: '' });

        const finalEmail = processEmailInput(email);

        if (!isValidEmail(finalEmail)) {
          setMessage({ type: 'error', text: '정확한 이메일 형식을 기입해 주세요.' });
          return;
        }

        try {
          if (actionType === 'signup') {
            if (password.length < 6) {
              setMessage({ type: 'error', text: '비밀번호는 최소 6자 이상이어야 합니다.' });
              return;
            }
            await auth.createUserWithEmailAndPassword(finalEmail, password);
            setMessage({ type: 'success', text: '성공적으로 가입되었습니다! 로그인 중입니다...' });
          } else if (actionType === 'login') {
            await auth.signInWithEmailAndPassword(finalEmail, password);
          } else if (actionType === 'reset') {
            await auth.sendPasswordResetEmail(finalEmail);
            setMessage({ type: 'success', text: '비밀번호 재설정 메일이 발송되었습니다.' });
          }
        } catch (err) {
          if (actionType === 'login' && (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') && (email.trim() === 'admin' || email.trim() === 'admin@admin.com')) {
            try {
              setMessage({ type: 'success', text: '관리자 데모 계정을 신규 생성하고 있습니다...' });
              await auth.createUserWithEmailAndPassword('admin@admin.com', 'admin09');
              await auth.signInWithEmailAndPassword('admin@admin.com', 'admin09');
              return;
            } catch (signUpErr) {
              console.error("데모계정 생성 실패", signUpErr);
            }
          }
          setMessage({ type: 'error', text: getErrorMessage(err.code) });
        }
      };

      const handleDemoLogin = async () => {
        setMessage({ type: '', text: '' });
        setEmail('admin');
        setPassword('admin09');
        
        try {
          await auth.signInWithEmailAndPassword('admin@admin.com', 'admin09');
        } catch (err) {
          if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
            try {
              await auth.createUserWithEmailAndPassword('admin@admin.com', 'admin09');
              await auth.signInWithEmailAndPassword('admin@admin.com', 'admin09');
            } catch (createErr) {
              setMessage({ type: 'error', text: '데모 계정 생성 중 오류 발생: ' + createErr.message });
            }
          } else {
            setMessage({ type: 'error', text: getErrorMessage(err.code) });
          }
        }
      };

      const handleLogout = async () => {
        try {
          setUser(null);
          setAllGradesData({
            '1': { fixed: {}, subjects: [], grades: {}, targetDept: '컴퓨터공학과' },
            '2': { fixed: {}, subjects: [], grades: {}, targetDept: '컴퓨터공학과' },
            '3': { fixed: {}, subjects: [], grades: {}, targetDept: '컴퓨터공학과' }
          });
          setEmail('');
          setPassword('');
          setView('login');
          setMessage({ type: 'success', text: '안전하게 로그아웃 되었습니다.' });
          await auth.signOut();
        } catch (err) {
          console.error("로그아웃 실패:", err);
          setUser(null);
          setView('login');
        }
      };

      const updateFixedField = (field, value) => {
        const limit = FIXED_STRUCTURE[field].limit;
        const currentFixed = allGradesData[grade]?.fixed || {};
        const updatedValue = value.length > limit ? value.substring(0, limit) : value;
        
        setAllGradesData(prev => ({
          ...prev,
          [grade]: {
            ...prev[grade],
            fixed: {
              ...currentFixed,
              [field]: updatedValue
            }
          }
        }));
      };

      const handleAddSelectedSubjectName = (subjectName) => {
        const currentSubjects = allGradesData[grade]?.subjects || [];

        if (currentSubjects.some(sub => sub.name === subjectName)) {
          setMessage({ type: 'error', text: `이미 '${subjectName}' 과목이 리스트에 존재합니다.` });
          setTimeout(() => setMessage({ type: '', text: '' }), 3000);
          setIsAddingSubject(false);
          return;
        }

        const newSub = {
          id: `custom_${Date.now()}`,
          name: subjectName,
          content: '',
          limit: 500 
        };

        setAllGradesData(prev => ({
          ...prev,
          [grade]: {
            ...prev[grade],
            subjects: [...currentSubjects, newSub]
          }
        }));

        setIsAddingSubject(false);
        setMessage({ type: '', text: '' });
      };

      const handleAddManualSubject = () => {
        const trimmedName = newSubjectName.trim();
        if (!trimmedName) return;
        handleAddSelectedSubjectName(trimmedName);
        setNewSubjectName('');
      };

      const handleDeleteSubject = (id, name) => {
        showConfirm(
          '과목 삭제 확인',
          `정말 '${name}' 과목 기록을 삭제하시겠습니까? 삭제한 정보는 되돌릴 수 없습니다.`,
          () => {
            const currentSubjects = allGradesData[grade]?.subjects || [];
            const currentGrades = allGradesData[grade]?.grades || {};
            const updatedGrades = { ...currentGrades };
            
            if (grade === '1') {
              delete updatedGrades[`${id}_1`];
              delete updatedGrades[`${id}_2`];
            }
            delete updatedGrades[id];

            setAllGradesData(prev => ({
              ...prev,
              [grade]: {
                ...prev[grade],
                subjects: currentSubjects.filter(s => s.id !== id),
                grades: updatedGrades
              }
            }));
          }
        );
      };

      const updateSubjectContent = (id, value) => {
        const currentSubjects = allGradesData[grade]?.subjects || [];
        const updatedSubjects = currentSubjects.map(s => {
          if (s.id === id) {
            return {
              ...s,
              content: value.length > s.limit ? value.substring(0, s.limit) : value
            };
          }
          return s;
        });

        setAllGradesData(prev => ({
          ...prev,
          [grade]: {
            ...prev[grade],
            subjects: updatedSubjects
          }
        }));
      };

      const updateGradeData = (subId, field, value) => {
        const currentGrades = allGradesData[grade]?.grades || {};

          ...currentGrades,
          [subId]: {
            ...currentGrades[subId],

        setAllGradesData(prev => ({
          ...prev,
          [grade]: {
            ...prev[grade],

          }
        }));
      };

      const handleSelectDepartment = (deptName) => {

        setDeptSearch('');

        setAllGradesData(prev => ({
          ...prev,
          [grade]: {
            ...prev[grade],
            targetDept: deptName
          }
        }));
      };

      const saveToCloud = async () => {
        if (!user) return;
        setSaveStatus('saving');

        try {
          const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('records').doc(`grade_${grade}`);
          const dataToSave = allGradesData[grade];
          await docRef.set({
            fixed: dataToSave.fixed || {},
            subjects: dataToSave.subjects || [],
            grades: dataToSave.grades || {},

      const isLiberalArtSubject = (name) => {
        if (!name) return false;
        return EXCLUDED_LIBERAL_ARTS.some(artKeyword => name.toLowerCase().includes(artKeyword));
      };

      const getGradesTabSubjects = () => {
        const activeSubjects = allGradesData[grade]?.subjects || [];
        
        if (grade !== '1') return activeSubjects;

        const splitSubjects = [];
        activeSubjects.forEach(sub => {
          const targetNamesToSplit = ["공통국어", "공통수학", "공통영어", "통합사회", "통합과학"];
          if (targetNamesToSplit.includes(sub.name)) {
            splitSubjects.push({
              id: `${sub.id}_1`,
              name: `${sub.name}1`,
              limit: sub.limit,
              isSplit: true
            });
            splitSubjects.push({
              id: `${sub.id}_2`,
              name: `${sub.name}2`,
              limit: sub.limit,
              isSplit: true
            });
          } else {
            splitSubjects.push(sub);
          }
        });

        return splitSubjects;
      };

      const calculateGPAByGrade = (targetGrade) => {
        const currentGrades = allGradesData[targetGrade]?.grades || {};
        const activeSubjects = allGradesData[targetGrade]?.subjects || [];

        const processingSubjects = [];
        if (targetGrade === '1') {
          activeSubjects.forEach(sub => {
            const targetNamesToSplit = ["공통국어", "공통수학", "공통영어", "통합사회", "통합과학"];
            if (targetNamesToSplit.includes(sub.name)) {
              processingSubjects.push({ id: `${sub.id}_1`, name: `${sub.name}1` });
              processingSubjects.push({ id: `${sub.id}_2`, name: `${sub.name}2` });
            } else {
              processingSubjects.push(sub);
            }
          });
        } else {
          processingSubjects.push(...activeSubjects);
        }

        let totalUnits9 = 0;
        let sumGrades9 = 0;
        let totalUnits5 = 0;
        let sumGrades5 = 0;

        processingSubjects.forEach(sub => {
          if (!isLiberalArtSubject(sub.name)) {
            const subGrade = currentGrades[sub.id] || { units: 0, grade9: 0, grade5: 0 };
            const units = subGrade.units || 0;
            const g9 = subGrade.grade9 || 0;
            const g5 = subGrade.grade5 || 0;

            if (units > 0) {
              if (g9 > 0) {
                totalUnits9 += units;
                sumGrades9 += (g9 * units);
              }
              if (g5 > 0) {
                totalUnits5 += units;
                sumGrades5 += (g5 * units);
              }
            }
          }
        });

        const average9 = totalUnits9 > 0 ? (sumGrades9 / totalUnits9) : null;
        const average5 = totalUnits5 > 0 ? (sumGrades5 / totalUnits5) : null;

        return { average9, average5 };
      };

      const analyzeTrend = (gradePoints) => {
        const validPoints = gradePoints.filter(p => p.val !== null);
        if (validPoints.length < 2) {
          return { text: "분석을 위한 성적 데이터가 부족합니다.", icon: "neutral" };
        }

        let first = validPoints[0];
        let last = validPoints[validPoints.length - 1];

        const diff = first.val - last.val; 

        if (diff > 0.15) {
          return { 
            text: "학년이 갈수록 등급이 낮아지는(성적이 상승하는) 대표적인 '지속 우상향(학업 성취도 개선형)' 흐름입니다. 대입 학생부 종합전형에서 학업 주도성과 발전 가능성 부문에서 매우 긍정적인 정성 평가를 받을 확률이 높습니다.", 
            icon: "up" 
          };
        } else if (diff < -0.15) {
          return { 
            text: "학년이 올라갈수록 등급 수치가 올라가는 '우하향(학업 관리 보완 필요형)' 흐름이 감지되었습니다. 3학년 1학기 최종 내신 및 주력 선택과목들의 성적 방어가 필요하며, 학생부 기재 내용(세특)을 통해 학업적 성실성을 추가 보강하는 보완 전략이 요구됩니다.", 
            icon: "down" 
          };
        } else {
          return { 
            text: "일정한 내신 등급 구간을 유지하는 '성적 안정형(지속 유지형)' 흐름입니다. 급격한 편차 없이 성실함을 꾸준히 증명하고 있으므로, 전공 핵심 권장 과목의 이수 여부와 성취도 수준이 입시 성공의 핵심 열쇠가 될 것입니다.", 
            icon: "stable" 
          };
        }
      };

      // Canvas 그래프 렌더링 (렌더링 동기화를 보장하는 브라우저 프레임 렌더러 연계)
      useEffect(() => {
        if (activeTab !== 'grades' || !canvasRef.current) return;

        let animationFrameId;

        const draw = () => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          
          canvas.width = 600;
          canvas.height = 300;

          const data1 = calculateGPAByGrade('1');
          const data2 = calculateGPAByGrade('2');
          const data3 = calculateGPAByGrade('3');

          const points9 = [
            { label: '고1', val: data1.average9 },
            { label: '고2', val: data2.average9 },
            { label: '고3', val: data3.average9 }
          ];

          const points5 = [
            { label: '고1', val: data1.average5 },
            { label: '고2', val: data2.average5 },
            { label: '고3', val: data3.average5 }
          ];

          ctx.clearRect(0, 0, canvas.width, canvas.height);

          ctx.strokeStyle = isDarkMode ? '#1e293b' : '#f1f5f9';
          ctx.lineWidth = 1;
          for (let i = 1; i < 9; i++) {
            const y = 30 + i * 25;
            ctx.beginPath();
            ctx.moveTo(60, y);
            ctx.lineTo(550, y);
            ctx.stroke();

            ctx.fillStyle = isDarkMode ? '#94a3b8' : '#64748b';
            ctx.font = 'bold 10px sans-serif';
            ctx.fillText(`${i}등급`, 25, y + 3);
          }

          const xCoords = [120, 300, 480];
          ctx.strokeStyle = isDarkMode ? '#334155' : '#cbd5e1';
          ctx.beginPath();
          ctx.moveTo(60, 255);
          ctx.lineTo(550, 255);
          ctx.stroke();

          points9.forEach((p, idx) => {
            ctx.fillStyle = isDarkMode ? '#cbd5e1' : '#334155';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(p.label, xCoords[idx], 275);
          });

          drawTrendLine(ctx, points9, xCoords, '#3b82f6', '#60a5fa');
          drawTrendLine(ctx, points5, xCoords, '#8b5cf6', '#a78bfa');

        animationFrameId = requestAnimationFrame(draw);
        return () => cancelAnimationFrame(animationFrameId);

        points.forEach((p, idx) => {
          if (p.val !== null) {
            const y = 30 + (p.val - 1) * 25;
            validCoords.push({ x: xCoords[idx], y, val: p.val });
          }
        });

        if (validCoords.length === 0) return;

        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(validCoords[0].x, validCoords[0].y);
        for (let i = 1; i < validCoords.length; i++) {
          ctx.lineTo(validCoords[i].x, validCoords[i].y);
        }
        ctx.stroke();

        validCoords.forEach(pt => {
          ctx.fillStyle = dotColor;
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, 6, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, 2.5, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = isDarkMode ? '#f8fafc' : '#0f172a';

                    </div>

                    {isDeptDropdownOpen && deptSearch && (
                      <div className="absolute left-0 right-0 mt-1.5 max-h-60 overflow-y-auto z-30 rounded-xl border shadow-xl bg-white dark:bg-slate-900 border-slate-150 dark:border-slate-800 text-slate-900 dark:text-white">
                        {filteredDepartments.length === 0 ? (
                          <div className="p-4 text-center text-xs text-slate-400 font-semibold">
                            해당 키워드가 포함된 대입 학과를 찾을 수 없습니다.
                          </div>
                        ) : (
                          filteredDepartments.map((dept, index) => (
                            <button
                              key={index}
                              onClick={() => handleSelectDepartment(dept)}
                              className={`w-full text-left px-4 py-2.5 text-xs font-bold transition-all flex items-center justify-between hover:bg-slate-50 dark:hover:bg-slate-800 ${
                                selectedDept === dept ? 'bg-blue-600/10 text-blue-600' : ''
                              }`}
                            >
                              <span>{dept}</span>
                              {selectedDept === dept && <SvgIcon name="check" className="w-4 h-4 text-blue-500" />}
                            </button>
                          ))
                        )}
                      </div>
                    )}
                  </div>
                </div>

                <div className={`p-8 rounded-3xl border bg-white dark:bg-slate-900 border-slate-100 dark:border-slate-800 shadow-sm`}>
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-6">
                    <div className="flex items-start md:items-center gap-3.5">
                      <div className="w-10 h-10 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center text-white shadow-md shrink-0">
                        <SvgIcon name="brain-circuit" className="w-5 h-5 animate-pulse" />
                      </div>
                      <div className="space-y-0.5 text-slate-800 dark:text-white">
                        <h3 className="text-base font-extrabold leading-tight">Gemini 2.5 AI 실시간 생기부 피드백</h3>
                        <p className="text-[11px] text-slate-400 font-semibold">내용과 목표 학과의 계열 적합성을 심도 있게 분석합니다.</p>
                      </div>
                    </div>

                    <button
                      onClick={handleGenerateAIFeedback}
                      disabled={isGeneratingFeedback}
                      className="flex items-center justify-center gap-2 px-6 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-xs font-black rounded-xl shadow-lg active:scale-95 disabled:opacity-50"
                    >
                      {isGeneratingFeedback ? (
                        <>
                          <SvgIcon name="refresh-cw" className="w-4 h-4 animate-spin" />
                          생기부 대입 진단 분석 중...
                        </>
                      ) : (
                        <>
                          <SvgIcon name="sparkles" className="w-4 h-4" />
                          AI 분석 리포트 생성하기
                        </>
                      )}
                    </button>
                  </div>

                  {isGeneratingFeedback ? (
                    <div className="py-20 text-center flex flex-col items-center justify-center gap-4">
                      <div className="relative flex items-center justify-center">
                        <div className="w-16 h-16 rounded-full border-4 border-blue-500/10 border-t-blue-600 animate-spin"></div>
                        <SvgIcon name="sparkles" className="w-6 h-6 text-blue-500 absolute" />
                      </div>
                      <div className="space-y-1">
                        <p className="text-xs font-bold text-slate-600 dark:text-slate-350">Gemini 생기부 기입 진단 엔진이 작동 중입니다...</p>
                        <p className="text-[10px] text-slate-400 font-semibold">선택한 [{selectedDept}]의 핵심 대입 인재상과 세택 텍스트를 대조하고 있습니다.</p>
                      </div>
                    </div>
                  ) : aiFeedbackText ? (
                    <div className="p-6 rounded-2xl border transition-all text-xs md:text-sm font-semibold leading-relaxed whitespace-pre-wrap bg-slate-50/50 dark:bg-slate-950/40 border-slate-100 dark:border-slate-800 text-slate-700 dark:text-slate-300">
                      {aiFeedbackText}
                    </div>
                  ) : (
                    <div className="py-14 text-center rounded-2xl border border-dashed bg-slate-55/30 dark:bg-slate-900/30 border-slate-200 dark:border-slate-800">
                      <SvgIcon name="brain-circuit" className="w-10 h-10 text-slate-300 dark:text-slate-800 mx-auto mb-3" />
                      <p className="font-semibold text-xs leading-relaxed text-slate-400">
                        목표 학과를 지정한 뒤, "AI 분석 리포트 생성하기"를 실행해 보세요.
                      </p>
                    </div>
                  )}
                </div>
              </div>
            )}

            <footer className="mt-16 pt-8 pb-4 border-t border-slate-200/20 dark:border-slate-800/40 text-center">
              <p className="text-[10px] md:text-[11px] font-black tracking-[0.25em] text-slate-400/80 dark:text-slate-600 uppercase select-none">
                용남고등학교 CATCH POINT
              </p>
            </footer>
          </main>

          {isSettingsOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
              <div className="rounded-2xl shadow-2xl border p-6 max-w-md w-full bg-white dark:bg-slate-900 border-slate-100 dark:border-slate-800 text-slate-900 dark:text-white">
                <div className="flex items-center justify-between pb-4 border-b border-slate-100 dark:border-slate-800">
                  <h3 className="text-base font-extrabold flex items-center gap-2">
                    <SvgIcon name="settings" className="w-5 h-5 text-blue-500" />
                    생기부 기록 매니저 설정
                  </h3>
                  <button onClick={() => setIsSettingsOpen(false)} className="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
                    <SvgIcon name="x" className="w-4 h-4" />
                  </button>
                </div>

                <div className="py-6 space-y-6">
                  <div className="flex items-center justify-between">
                    <div>
                      <h4 className="text-sm font-bold">화면 테마 설정</h4>
                      <p className="text-[11px] mt-0.5 text-slate-400">테마를 선택하세요.</p>
                    </div>
                    <button 
                      onClick={() => setIsDarkMode(!isDarkMode)}
                      className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${
                        isDarkMode ? 'bg-blue-600' : 'bg-slate-200'
                      }`}
                    >
                      <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${
                        isDarkMode ? 'translate-x-6' : 'translate-x-1'
                      } flex items-center justify-center`}
                    >
                      {isDarkMode ? <SvgIcon name="moon" className="w-2.5 h-2.5 text-blue-600" /> : <SvgIcon name="sun" className="w-2.5 h-2.5 text-amber-500" />}
                    </span>
                    </button>
                  </div>

                  <div className="space-y-2.5">
                    <div>
                      <h4 className="text-sm font-bold">글자 수 측정 기준 변경</h4>
                      <p className="text-[11px] mt-0.5 text-slate-450">바이트 계산 모드를 켜거나 끌 수 있습니다.</p>
                    </div>
                    <div className="grid grid-cols-2 gap-2 p-1 rounded-xl bg-slate-100 dark:bg-slate-800">
                      <button 
                        onClick={() => setByteCalcMode('char')}
                        className={`py-2 text-xs font-bold rounded-lg transition-all ${
                          byteCalcMode === 'char' ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-white shadow-sm' : 'text-slate-400'
                        }`}
                      >
                        일반 글자수
                      </button>
                      <button 
                        onClick={() => setByteCalcMode('byte')}
                        className={`py-2 text-xs font-bold rounded-lg transition-all ${
                          byteCalcMode === 'byte' ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-white shadow-sm' : 'text-slate-455'
                        }`}
                      >
                        나이스 바이트(Byte)
                      </button>
                    </div>
                  </div>
                </div>

                <div className="pt-4 border-t border-slate-100 dark:border-slate-800 flex justify-end">
                  <button onClick={() => setIsSettingsOpen(false)} className="px-5 py-2.5 bg-blue-600 text-white rounded-xl font-bold text-xs">
                    설정 완료
                  </button>
                </div>
              </div>
            </div>
          )}

          {modal.show && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
              <div className="rounded-2xl shadow-xl border p-6 max-w-sm w-full bg-white dark:bg-slate-900 border-slate-100 dark:border-slate-800 text-slate-900 dark:text-white">
                <h4 className="text-sm font-extrabold flex items-center gap-1.5">
                  <SvgIcon name="alert-circle" className="w-4 h-4 text-red-500" />
                  {modal.title}
                </h4>
                <p className="text-xs mt-2.5 font-semibold leading-relaxed text-slate-550">
                  {modal.message}
                </p>
                <div className="flex gap-2.5 mt-5">
                  <button onClick={modal.onConfirm} className="flex-1 py-2 bg-red-500 text-white rounded-lg font-bold text-xs">
                    삭제하기
                  </button>
                  <button onClick={() => setModal({ show: false, title: '', message: '', onConfirm: null })} className="flex-1 py-2 rounded-lg font-bold text-xs bg-slate-100 dark:bg-slate-800 text-slate-400">
                    취소
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 문서 구조 동기화 즉시 앱을 root 엘리먼트에 마운트
    window.addEventListener('DOMContentLoaded', () => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    });
  </script>

</body>
</html>
